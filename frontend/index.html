<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Feud – Host Screen</title>
    <style>
      :root {
        --bg: #0e0f13;
        --panel: #171923;
        --accent: #ffd166;
        --text: #eaeef6;
        --muted: #9aa4b2;
        --danger: #ff4d4f;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 24px;
        background: var(--panel);
        border-bottom: 1px solid #222635;
        position: sticky;
        top: 0;
        z-index: 5;
      }
      h1 {
        font-size: 20px;
        margin: 0;
        letter-spacing: 0.5px;
      }
      .wrap {
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 16px;
        padding: 16px;
      }
      .card {
        background: var(--panel);
        border: 1px solid #23283b;
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }
      .stack {
        display: grid;
        gap: 12px;
      }
      label {
        font-size: 12px;
        color: var(--muted);
      }
      input[type="text"],
      select {
        width: 100%;
        padding: 10px 12px;
        background: #0f111a;
        color: var(--text);
        border: 1px solid #272c3f;
        border-radius: 10px;
      }
      button {
        padding: 10px 12px;
        background: #24324a;
        color: var(--text);
        border: 1px solid #2e3a55;
        border-radius: 10px;
        cursor: pointer;
      }
      button.primary {
        background: #2a3552;
        border-color: #3a4c7c;
      }
      button.accent {
        background: var(--accent);
        border-color: #f7c65d;
        color: #2b2932;
        font-weight: 700;
      }
      button.danger {
        background: #3b1f25;
        border-color: #7a2f33;
        color: #ffd9dc;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .question {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .answers {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-top: 12px;
      }
      .answer {
        background: #0f111a;
        border: 1px solid #2b3147;
        border-radius: 12px;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .answer .txt {
        font-size: 18px;
        font-weight: 650;
        text-transform: uppercase;
      }
      .answer .pts {
        font-size: 18px;
        font-weight: 700;
      }
      .answer.hidden .txt,
      .answer.hidden .pts {
        filter: blur(8px);
        opacity: 0.5;
      }

      .scoreboard {
        display: flex;
        gap: 12px;
      }
      .team {
        flex: 1;
        background: #0f111a;
        border: 1px solid #2b3147;
        border-radius: 12px;
        padding: 12px;
      }
      .team h3 {
        margin: 0 0 6px 0;
        font-size: 14px;
        color: var(--muted);
        font-weight: 600;
      }
      .team .score {
        font-size: 28px;
        font-weight: 800;
      }

      .strikes {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .strike {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        border: 1px solid #3b2a2c;
        background: #1b1012;
        display: grid;
        place-items: center;
        font-size: 20px;
        color: #ff6b6e;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .space {
        height: 12px;
      }

      .muted {
        color: var(--muted);
        font-size: 12px;
      }
      .badge {
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid #3a4463;
        background: #101423;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Family Feud — Host</h1>
      <div class="row">
        <span class="badge" id="phase">idle</span>
        <span class="badge">Round <span id="round">0</span></span>
      </div>
    </header>

    <div class="wrap">
      <!-- Left: Controls -->
      <div class="card stack">
        <div class="stack">
          <label>Start Round (random question)</label>
          <button class="primary" id="btnStartRound">Start Round</button>
          <div class="muted">
            Run <code>!start_survey</code> in Discord after you click start.
          </div>
        </div>

        <div class="space"></div>

        <div class="stack">
          <label>Begin Play (after Discord sends results)</label>
          <button id="btnBeginPlay" class="accent">Begin Play</button>
          <div class="muted">
            After the bot posts results to backend with
            <code>!end_survey</code>.
          </div>
        </div>

        <div class="space"></div>

        <div class="stack">
          <label>Current Team</label>
          <select id="teamSelect">
            <option value="Team 1">Team 1</option>
            <option value="Team 2">Team 2</option>
          </select>
          <button id="btnSetTeam">Set Team</button>
        </div>

        <div class="space"></div>

        <div class="stack">
          <label>Strikes</label>
          <div class="row">
            <button id="btnStrike" class="danger">
              Add Strike (for current team)
            </button>
            <button id="btnClearStrikes">Clear Strikes</button>
          </div>
        </div>

        <div class="space"></div>

        <div class="stack">
          <label>Round Controls</label>
          <div class="row">
            <button id="btnEndRound">End Round</button>
            <button id="btnResetGame" class="danger">Reset Game</button>
          </div>
        </div>

        <div class="space"></div>

        <div class="stack">
          <label>Leaderboard</label>
          <div class="scoreboard">
            <div class="team">
              <h3>Team 1</h3>
              <div class="score" id="score1">0</div>
              <div class="strikes">
                <div class="strike" id="t1s1">X</div>
                <div class="strike" id="t1s2">X</div>
                <div class="strike" id="t1s3">X</div>
              </div>
            </div>
            <div class="team">
              <h3>Team 2</h3>
              <div class="score" id="score2">0</div>
              <div class="strikes">
                <div class="strike" id="t2s1">X</div>
                <div class="strike" id="t2s2">X</div>
                <div class="strike" id="t2s3">X</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Board -->
      <div class="card">
        <div class="stack">
          <div class="question" id="question">No question yet.</div>
          <div class="muted">Answers come from Team 3's Discord survey.</div>
          <div class="answers" id="answers"></div>
        </div>
      </div>
    </div>

    <script>
      const API = "http://127.0.0.1:5000/api";

      // Example question bank shown to the host only
      const QUESTIONS = [
        "Name something that absolutely does not belong in a refrigerator",
        "The worst thing to hear right before a job interview is ____",
        "What would instantly ruin a wedding ceremony?",
        "My supervillain origin story starts with ____",
        "The title of my cooking show: 'Accidentally Cooking ____'",
        "If animals could talk, which one would be the rudest?",
        "The worst possible roommate habit is ____",
        "What should never be whispered dramatically?",
        "The real reason the internet was invented was ____",
        "If Mondays were a person, they would definitely ____",
        "The worst thing to discover in your backpack at school is ____",
        "My retirement plan currently depends on ____",
        "The title of my failed startup: 'Uber for ____'",
        "What would make a terrible national anthem?",
        "The first law I would pass as ruler of Earth: ____",
        "What should never be deep-fried?",
        "The worst thing to shout during a quiet exam is ____",
        "Scientists were shocked to discover that cats actually ____",
        "The hidden level in real life unlocks when you ____",
        "The worst possible theme for a family reunion is ____",
        "If ghosts had hobbies, they would probably ____",
        "My autobiography would be called: 'Oops, I ____ Again'",
        "The most suspicious thing to say at an airport is ____",
        "What would immediately start a supermarket riot?",
        "The worst motivational quote ever: 'Just ____.'",
        "The secret ingredient in fast food is probably ____",
        "What would make a terrible Olympic sport?",
        "The last message humanity sends to aliens is ____",
        "The worst thing to accidentally clap for is ____",
        "If chairs had opinions, they would complain about ____",
        "The true purpose of homework is secretly ____",
        "What would completely ruin time travel?",
        "The title of my horror movie: 'The Basement Full of ____'",
        "The most useless superpower imaginable: ____",
        "What should never be turned into a reality TV show?",
        "The worst possible AI assistant feature would be ____",
        "If vegetables had personalities, which one would be a criminal?",
        "The strangest thing to inherit from your grandparents is ____",
        "The apocalypse begins when someone finally ____",
        "The worst possible slogan for a toothpaste brand: ____",
      ];

      const els = {
        start: document.getElementById("btnStartRound"),
        begin: document.getElementById("btnBeginPlay"),
        teamSel: document.getElementById("teamSelect"),
        setTeam: document.getElementById("btnSetTeam"),
        strike: document.getElementById("btnStrike"),
        clearStrikes: document.getElementById("btnClearStrikes"),
        endRound: document.getElementById("btnEndRound"),
        resetGame: document.getElementById("btnResetGame"),
        question: document.getElementById("question"),
        answers: document.getElementById("answers"),
        score1: document.getElementById("score1"),
        score2: document.getElementById("score2"),
        phase: document.getElementById("phase"),
        round: document.getElementById("round"),
        t1s: [
          document.getElementById("t1s1"),
          document.getElementById("t1s2"),
          document.getElementById("t1s3"),
        ],
        t2s: [
          document.getElementById("t2s1"),
          document.getElementById("t2s2"),
          document.getElementById("t2s3"),
        ],
      };

      // Pick a random question
      function getRandomQuestion() {
        const idx = Math.floor(Math.random() * QUESTIONS.length);
        return QUESTIONS[idx];
      }

      async function api(path, method = "GET", body = null) {
        const opts = {
          method,
          headers: { "Content-Type": "application/json" },
        };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(`${API}${path}`, opts);
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        return await res.json();
      }

      function renderStrikes(strikes) {
        els.t1s.forEach((el, idx) => {
          el.style.opacity = strikes["Team 1"] > idx ? 1 : 0.15;
        });
        els.t2s.forEach((el, idx) => {
          el.style.opacity = strikes["Team 2"] > idx ? 1 : 0.15;
        });
      }

      function render(state) {
        els.phase.textContent = state.phase;
        els.round.textContent = state.round_number;
        els.question.textContent = state.question || "No question yet.";

        els.score1.textContent = state.scores["Team 1"] || 0;
        els.score2.textContent = state.scores["Team 2"] || 0;
        renderStrikes(state.strikes || { "Team 1": 0, "Team 2": 0 });

        els.answers.innerHTML = "";
        (state.answers || []).forEach((a, idx) => {
          const row = document.createElement("div");
          row.className = "answer" + (a.revealed ? "" : " hidden");
          const left = document.createElement("div");
          left.className = "txt";
          left.textContent = a.text;
          const right = document.createElement("div");
          right.className = "pts";
          right.textContent = a.points;
          const btn = document.createElement("button");
          btn.textContent = a.revealed ? "Revealed" : "Reveal";
          btn.disabled =
            !!a.revealed || state.phase === "survey" || state.phase === "ready";
          btn.addEventListener("click", async () => {
            try {
              const team = els.teamSel.value;
              await api("/reveal", "POST", { index: idx, team });
              await refresh();
            } catch (e) {
              alert(e);
            }
          });
          row.appendChild(left);
          row.appendChild(right);
          row.appendChild(btn);
          els.answers.appendChild(row);
        });
      }

      async function refresh() {
        try {
          const state = await api("/state");
          render(state);
        } catch (e) {
          console.error(e);
        }
      }

      // Wire up controls
      els.start.addEventListener("click", async () => {
        const q = getRandomQuestion();
        if (!q) return alert("No questions available");
        try {
          await api("/start_round", "POST", { question: q });
          await refresh();
        } catch (e) {
          alert(e);
        }
      });

      els.begin.addEventListener("click", async () => {
        try {
          await api("/begin_play", "POST");
          await refresh();
        } catch (e) {
          alert(e);
        }
      });

      els.setTeam.addEventListener("click", async () => {
        try {
          await api("/set_team", "POST", { team: els.teamSel.value });
          await refresh();
        } catch (e) {
          alert(e);
        }
      });

      els.strike.addEventListener("click", async () => {
        try {
          await api("/strike", "POST", { team: els.teamSel.value });
          await refresh();
        } catch (e) {
          alert(e);
        }
      });

      els.clearStrikes.addEventListener("click", async () => {
        try {
          await api("/clear_strikes", "POST");
          await refresh();
        } catch (e) {
          alert(e);
        }
      });

      els.endRound.addEventListener("click", async () => {
        try {
          await api("/end_round", "POST");
          await refresh();
        } catch (e) {
          alert(e);
        }
      });

      els.resetGame.addEventListener("click", async () => {
        if (!confirm("Reset everything?")) return;
        try {
          await api("/reset_game", "POST");
          await refresh();
        } catch (e) {
          alert(e);
        }
      });

      // Init
      refresh();
      setInterval(refresh, 2000); // simple polling
    </script>
  </body>
</html>
